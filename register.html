<div class="container py-5">

  <div class="row justify-content-center">

    <div class="col-md-6">

      <div class="card shadow">

        <div class="card-body p-5">

          <h2 class="text-center mb-4 text-dark">
            Crear Cuenta
          </h2>

          <form id="registerForm">

            <div class="mb-3">

              <label class="form-label text-dark">
                Nombre
              </label>

              <input
                type="text"
                id="name"
                class="form-control"
                required
              >

            </div>

            <div class="mb-3">

              <label class="form-label text-dark">
                Correo
              </label>

              <input
                type="email"
                id="email"
                class="form-control"
                required
              >

            </div>

            <div class="mb-4">

              <label class="form-label text-dark">
                Contraseña
              </label>

              <input
                type="password"
                id="password"
                class="form-control"
                required
              >

            </div>

            <button class="btn btn-dark w-100">

              Registrarse

            </button>

          </form>

        </div>

      </div>

    </div>

  </div>
