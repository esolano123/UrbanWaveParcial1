<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carrito | UrbanWave</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>

    body {
      background-color: #f8f9fa;
    }

    .cart-image {
      height: 120px;
      object-fit: cover;
      border-radius: 10px;
    }

  </style>

</head>

<body>

  <!-- NAVBAR -->

  <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
    <div class="container">
  
      <a class="navbar-brand fw-bold" href="index.html">
        UrbanWave
      </a>
  
      <button
        class="navbar-toggler"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#navbarNav">
  
        <span class="navbar-toggler-icon"></span>
  
      </button>
  
      <div class="collapse navbar-collapse" id="navbarNav">
  
        <ul class="navbar-nav ms-auto align-items-lg-center">
  
          <li class="nav-item">
            <a class="nav-link" href="index.html">
              Inicio
            </a>
          </li>
  
          <li class="nav-item">
            <a class="nav-link" href="catalogo.html">
              Catálogo
            </a>
          </li>
  
          <li class="nav-item">
            <a class="nav-link active" href="nosotros.html">
              Nosotros
            </a>
          </li>
  
          <li class="nav-item">
            <a class="nav-link" href="contacto.html">
              Contacto
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="login.html">
              Login
            </a>
          </li>
          
          
  
          <li class="nav-item ms-lg-3">
            <a class="nav-link fw-bold" href="carrito.html">
              🛒 Carrito
              (<span id="cartCount">0</span>)
            </a>
          </li>
  
        </ul>
  
      </div>
  
    </div>
  </nav>

  <!-- CONTENT -->

  <div class="container py-5">

    <h1 class="fw-bold mb-5">
      🛒 Tu Carrito
    </h1>

    <div id="cartContainer" class="row g-4">

    </div>

    <!-- TOTAL -->

    <div class="card shadow mt-5">

      <div class="card-body d-flex justify-content-between align-items-center flex-wrap">

        <h4 class="fw-bold mb-0">
          Total:
          $<span id="cartTotal">0</span> MXN
        </h4>

        <div class="mt-3 mt-md-0">

          <button
            class="btn btn-outline-danger me-2"
            onclick="clearCart()">

            Vaciar carrito

          </button>

          <a href="catalogo.html" class="btn btn-dark">
            Seguir comprando
          </a>

        </div>

      </div>

    </div>

  </div>

  <!-- SCRIPTS -->

  <script>

    const cartContainer = document.getElementById('cartContainer');

    const cartTotal = document.getElementById('cartTotal');

    function updateCartCount() {

      let cart = JSON.parse(localStorage.getItem('cart')) || [];

      document.getElementById('cartCount').innerText = cart.length;

    }

    function loadCart() {

      let cart = JSON.parse(localStorage.getItem('cart')) || [];

      cartContainer.innerHTML = '';

      let total = 0;

      if (cart.length === 0) {

        cartContainer.innerHTML = `
          <div class="col-12">
            <div class="alert alert-dark text-center">
              Tu carrito está vacío.
            </div>
          </div>
        `;

      }

      cart.forEach((product, index) => {

        total += product.price;

        cartContainer.innerHTML += `

          <div class="col-md-6">

            <div class="card shadow h-100">

              <div class="row g-0">

                <div class="col-4">

                  <img
                    src="${product.image}"
                    class="img-fluid cart-image w-100 h-100"
                    alt="${product.name}"
                  >

                </div>

                <div class="col-8">

                  <div class="card-body">

                    <h5 class="card-title">
                      ${product.name}
                    </h5>

                    <p class="text-muted mb-1">
                      ${product.category}
                    </p>

                    <p class="fw-bold">
                      $${product.price} MXN
                    </p>

                    <button
                      class="btn btn-sm btn-danger"
                      onclick="removeItem(${index})">

                      Eliminar

                    </button>

                  </div>

                </div>

              </div>

            </div>

          </div>

        `;

      });

      cartTotal.innerText = total;

      updateCartCount();

    }

    function removeItem(index) {

      let cart = JSON.parse(localStorage.getItem('cart')) || [];

      cart.splice(index, 1);

      localStorage.setItem('cart', JSON.stringify(cart));

      loadCart();

    }

    function clearCart() {

      localStorage.removeItem('cart');

      loadCart();

    }

    loadCart();

  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
