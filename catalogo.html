<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catálogo | UrbanWave</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">

  <style>

    .product-card img {
      height: 300px;
      object-fit: cover;
    }

  </style>

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">

  <div class="container">

    <a class="navbar-brand fw-bold" href="index.html">
      UrbanWave
    </a>

    <button
      class="navbar-toggler"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#navbarNav">

      <span class="navbar-toggler-icon"></span>

    </button>

    <div class="collapse navbar-collapse" id="navbarNav">

      <ul class="navbar-nav ms-auto align-items-lg-center">

        <li class="nav-item">
          <a class="nav-link" href="index.html">
            Inicio
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link active" href="catalogo.html">
            Catálogo
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="nosotros.html">
            Nosotros
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="contacto.html">
            Contacto
          </a>
        </li>

        <li class="nav-item ms-lg-3">
          <a class="nav-link fw-bold" href="carrito.html">
            🛒 Carrito
            (<span id="cartCount">0</span>)
          </a>
        </li>

      </ul>

    </div>

  </div>

</nav>

<!-- HEADER -->

<section class="container" style="margin-top:120px;">

  <h2 class="text-center mb-3">
    Catálogo Completo
  </h2>

  <p class="text-center text-muted mb-5">
    Descubre nuestra colección completa de streetwear.
  </p>

  <!-- PRODUCTS CONTAINER -->

  <div class="row g-4" id="productsContainer">

  </div>

</section>

<!-- FOOTER -->

<footer class="text-center py-4">
  © 2026 UrbanWave
</footer>

<!-- SCRIPTS -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script src="cart.js"></script>

<script>

const API_URL = 'https://urbanwave-backend.onrender.com/api/products';

const productsContainer = document.getElementById('productsContainer');

async function loadProducts() {

  try {

    const response = await fetch(API_URL);

    const products = await response.json();

    productsContainer.innerHTML = '';

    products.forEach(product => {

      productsContainer.innerHTML += `

        <div class="col-md-3">

          <div class="card product-card h-100 shadow-sm">

            <img
              src="${product.image}"
              class="card-img-top"
              alt="${product.name}"
            >

            <div class="card-body text-center d-flex flex-column">

              <h6>
                ${product.name}
              </h6>

              <p class="text-muted mb-1">
                ${product.category || ''}
              </p>

              <p class="fw-bold">
                $${product.price} MXN
              </p>

              <p class="small text-muted">
                Stock: ${product.stock}
              </p>

              <button
                class="btn btn-dark mt-auto"
                onclick='addToCart(${JSON.stringify(product)})'
              >
                Agregar al carrito
              </button>

            </div>

          </div>

        </div>

      `;

    });

  } catch (error) {

    console.error('Error loading products:', error);

    productsContainer.innerHTML = `
      <div class="col-12">
        <div class="alert alert-danger text-center">
          Error cargando productos.
        </div>
      </div>
    `;

  }

}

function addToCart(product) {

  let cart = JSON.parse(localStorage.getItem('cart')) || [];

  cart.push(product);

  localStorage.setItem('cart', JSON.stringify(cart));

  alert(`${product.name} agregado al carrito`);

  updateCartCount();

}

loadProducts();

</script>

</body>
</html>
